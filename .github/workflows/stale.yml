name: Stale

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been automatically marked as stale due to inactivity."
          stale-pr-message: "This pull request has been automatically marked as stale due to inactivity."
          close-issue-message: "Closing stale issue due to inactivity."
          close-pr-message: "Closing stale pull request due to inactivity."
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          days-before-stale: 45
          days-before-close: 14
          exempt-issue-labels: "security,pinned"
          exempt-pr-labels: "security,pinned"
