####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-js:2025.3
bootstrap: npm ci
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses
  - name: VulnerableLibraries
  - name: HardcodedPasswords
  - name: JSUnresolvedReference
  - name: JSUnusedLocalSymbols
  - name: JSUnusedGlobalSymbols
hardcodedPasswords:
  reportDefaultSuspiciousVariableNames: true
exclude:
  - name: All
    paths:
      - dist
      - node_modules